<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mon Agenda Sportif</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Personnalisation des couleurs pour un mode sombre profond */
        body { background-color: #0b0f19; color: #ffffff; }
        .card { background-color: #1a202c; border: 1px solid #2d3748; }
    </style>
</head>
<body class="font-sans antialiased">

    <header class="bg-gray-900 border-b border-gray-800 p-4 sticky top-0 z-10">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-bold text-yellow-400">⚡ SPORT<span class="text-white">AGENDA</span></h1>
            <input type="text" placeholder="Rechercher un match (ex: PSG)..." class="bg-gray-800 text-white text-sm rounded-full px-4 py-2 w-64 focus:outline-none focus:ring-2 focus:ring-yellow-400">
        </div>
    </header>

    <nav class="max-w-7xl mx-auto p-4 mt-4">
        <div class="flex gap-2 overflow-x-auto pb-2">
            <button class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-md font-semibold text-sm">Tous</button>
            <button class="bg-gray-800 hover:bg-gray-700 text-white px-4 py-2 rounded-md font-semibold text-sm">Football</button>
            <button class="bg-gray-800 hover:bg-gray-700 text-white px-4 py-2 rounded-md font-semibold text-sm">Basketball</button>
            <button class="bg-gray-800 hover:bg-gray-700 text-white px-4 py-2 rounded-md font-semibold text-sm">Tennis</button>
            <button class="bg-gray-800 hover:bg-gray-700 text-white px-4 py-2 rounded-md font-semibold text-sm">Rugby</button>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto p-4">
        <h2 class="text-xl font-semibold mb-6 border-b border-gray-800 pb-2">Programme en direct & à venir</h2>
        
        <div id="match-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            </div>
    </main>

    <script>
        // Voici tes données (plus tard, elles viendront d'une vraie API)
        const matchs = [
            { sport: "Football", equipe1: "Paderborn", equipe2: "Wolfsburg", heure: "20:30", statut: "En direct", ligue: "Bundesliga" },
            { sport: "Baseball", equipe1: "Pirates", equipe2: "Cubs", heure: "19:35", statut: "En direct", ligue: "MLB" },
            { sport: "Football", equipe1: "PSG", equipe2: "Marseille", heure: "21:00", statut: "À venir", ligue: "Ligue 1" },
            { sport: "Basketball", equipe1: "Lakers", equipe2: "Warriors", heure: "04:30", statut: "À venir", ligue: "NBA" },
            { sport: "Hockey", equipe1: "Slovénie", equipe2: "Italie", heure: "20:20", statut: "En direct", ligue: "Championnat du Monde" },
            { sport: "Tennis", equipe1: "Alcaraz", equipe2: "Djokovic", heure: "14:00", statut: "Terminé", ligue: "Roland Garros" }
        ];

        const container = document.getElementById('match-container');

        // Fonction pour afficher les matchs
        function afficherMatchs() {
            container.innerHTML = ''; // On vide le conteneur
            
            matchs.forEach(match => {
                // Choix de la couleur du badge selon le statut
                let badgeColor = match.statut === 'En direct' ? 'bg-red-600 animate-pulse' : 
                                 match.statut === 'Terminé' ? 'bg-gray-600' : 'bg-green-600';

                // Création de la carte HTML
                const carteHTML = `
                    <div class="card rounded-lg p-4 hover:border-gray-500 transition cursor-pointer flex flex-col justify-between h-36">
                        <div class="flex justify-between items-start mb-2">
                            <span class="text-xs font-bold text-gray-400 uppercase tracking-wider">${match.ligue}</span>
                            <span class="${badgeColor} text-white text-[10px] font-bold px-2 py-1 rounded uppercase tracking-wide">
                                ${match.statut}
                            </span>
                        </div>
                        <div class="text-center font-bold text-lg flex justify-between items-center mt-2">
                            <span class="truncate w-5/12 text-right">${match.equipe1}</span>
                            <span class="text-gray-500 text-sm w-2/12">VS</span>
                            <span class="truncate w-5/12 text-left">${match.equipe2}</span>
                        </div>
                        <div class="text-center text-sm text-gray-400 mt-4 border-t border-gray-700 pt-2">
                            Aujourd'hui à ${match.heure}
                        </div>
                    </div>
                `;
                container.innerHTML += carteHTML;
            });
        }

        // Lancement de la fonction au chargement de la page
        afficherMatchs();
    </script>
</body>
</html>
